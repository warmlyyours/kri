{{ define "main" }}

{{ $data := .Data }}

<div class="container" role="main" style="text-align: center;">
  <div class="col">
    <article class="post-preview">
      <div class="panel-group" id="accordion">
        {{ range $key, $value := .Data.Terms.ByCount }}
          <div class="panel panel-default">
            <a class="collapsed" role="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ $value.Name | replaceRE "/$" ""}}" data-parent="#accordion">
                <div class="panel-heading" id="header{{ $value.Name }}">
                  <h4 class="panel-title">
                      {{ $value.Name }}
                    <span class="badge">{{ $value.Count }}</span>
                  </h4>
                </div>
            </a>
            <div id="collapse{{ $value.Name }}" class="panel-collapse collapse">
              <div class="panel-body">
                <a href="{{ $.Site.LanguagePrefix | absURL }}/{{ $data.Plural }}/{{ $value.Name | urlize | replaceRE "/$" "" }}" class="list-group-item view-all">
                View all</a>
                <div class="list-group">
                  {{ range $item := $value.WeightedPages }}
                    <a rel="follow" href="{{$item.Permalink | replaceRE "/$" ""}}" class="list-group-item">{{ $item.Title }}</a>
                  {{ end }}
                </div>
              </div>
            </div>
          </div>
        {{ end }}
      </div>
    </article>
  </div>
</div>


{{ end }}
